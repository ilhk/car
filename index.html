<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Menu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        /* Navigation Bar */
        .navbar {
            background-color: #343a40;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            margin-left: 20px;
        }
        .navbar .logo {
            font-size: 20px;
            font-weight: bold;
            margin-left: 0;
        }
        /* Main Content Container */
        .main-container {
            max-width: 800px;
            margin: 80px auto;
            padding: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            color: #212529;
            margin-bottom: 20px;
        }
        p {
            color: #6c757d;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        /* Button Style */
        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="index.html" class="logo">My Website</a>
        <div>
            <a href="index.html">Home</a>
            <a href="part_description.html">Part Description</a>
        </div>
    </div>

    <div class="main-container">
        <h1>Welcome to the Main Menu</h1>
        <p>Select an option from the menu above, or click the button below to view the detailed specifications.</p>
        <a href="part_description.html" class="btn">Go to Part Description</a>
    </div>

</body>
</html>
